name: RPG regression

on:
  push:
  pull_request:

jobs:
  app-rpg-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax checks
        run: |
          find src -name '*.js' -print0 | xargs -0 -n1 node --experimental-default-type=module --check
      - name: RPG regression suite
        run: node --experimental-default-type=module --test tests/rpg/*.test.mjs
